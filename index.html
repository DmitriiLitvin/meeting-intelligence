<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Intelligence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Georgia', serif; background: #0f0f0f; color: #e8e4dc; min-height: 100vh; }

  .header { padding: 2rem 2.5rem 1.25rem; border-bottom: 0.5px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: #888; }
  .logo span { color: #c9b89a; }
  .header-meta { font-size: 12px; color: #444; }

  .main { padding: 2rem 2.5rem; max-width: 1100px; }
  .page { display: none; }
  .page.active { display: block; }

  .section-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin-bottom: 1.5rem; }

  .meetings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
  .meeting-card { background: #161616; border: 0.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 1.25rem; cursor: pointer; transition: all 0.2s; }
  .meeting-card:hover { border-color: rgba(201,184,154,0.35); background: #1a1a1a; transform: translateY(-1px); }
  .card-date { font-size: 11px; letter-spacing: 0.1em; color: #555; text-transform: uppercase; margin-bottom: 8px; }
  .card-title { font-size: 15px; color: #ddd; margin-bottom: 10px; line-height: 1.4; }
  .card-summary { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 3px; }
  .badge-tasks { background: rgba(201,184,154,0.1); color: #c9b89a; border: 0.5px solid rgba(201,184,154,0.2); }
  .badge-resolved { background: rgba(100,180,120,0.1); color: #7ab88a; border: 0.5px solid rgba(100,180,120,0.2); }
  .badge-open { background: rgba(138,154,184,0.1); color: #8a9ab8; border: 0.5px solid rgba(138,154,184,0.2); }

  .empty-state { text-align: center; padding: 5rem 2rem; color: #333; }
  .empty-state p { font-size: 14px; }

  .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #555; cursor: pointer; margin-bottom: 1.75rem; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.2s; background: none; border: none; }
  .back-btn:hover { color: #c9b89a; }

  .detail-header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
  .detail-date { font-size: 11px; color: #555; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .detail-title { font-size: 24px; color: #e8e4dc; line-height: 1.3; margin-bottom: 8px; }
  .detail-participants { font-size: 13px; color: #666; }

  .summary-block { background: #161616; border-left: 2px solid #c9b89a; padding: 1rem 1.25rem; border-radius: 0 6px 6px 0; margin-bottom: 2rem; font-size: 14px; color: #aaa; line-height: 1.8; }

  .section-block { margin-bottom: 2rem; }
  .section-block h3 { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }
  .section-block h3::after { content: ''; flex: 1; height: 0.5px; background: rgba(255,255,255,0.05); }
  .count-badge { font-size: 10px; background: rgba(255,255,255,0.05); color: #555; padding: 2px 7px; border-radius: 10px; letter-spacing: 0; text-transform: none; font-family: monospace; }

  .task-item { padding: 12px 0; border-bottom: 0.5px solid rgba(255,255,255,0.04); display: flex; gap: 12px; align-items: flex-start; }
  .task-item:last-child { border-bottom: none; }
  .task-check { width: 16px; height: 16px; border: 0.5px solid rgba(201,184,154,0.25); border-radius: 3px; flex-shrink: 0; margin-top: 2px; }
  .task-content { flex: 1; }
  .task-text { font-size: 14px; color: #ccc; line-height: 1.5; }
  .task-meta { display: flex; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
  .task-owner { font-size: 12px; color: #8a9ab8; }
  .task-deadline { font-size: 12px; color: #c9b89a; }
  .task-fathom { font-size: 11px; color: #666; text-decoration: none; border-bottom: 0.5px solid #333; transition: color 0.2s; }
  .task-fathom:hover { color: #c9b89a; border-color: #c9b89a; }

  .list-item { padding: 9px 0; border-bottom: 0.5px solid rgba(255,255,255,0.04); font-size: 14px; color: #999; line-height: 1.5; display: flex; gap: 12px; align-items: flex-start; }
  .list-item:last-child { border-bottom: none; }
  .dot-green { width: 6px; height: 6px; border-radius: 50%; background: #7ab88a; flex-shrink: 0; margin-top: 7px; }
  .dot-blue { width: 6px; height: 6px; border-radius: 50%; background: #8a9ab8; flex-shrink: 0; margin-top: 7px; }

  .no-items { font-size: 13px; color: #444; padding: 8px 0; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">Meeting <span>Intelligence</span></div>
  <div class="header-meta" id="header-count"></div>
</div>

<div class="main">
  <div id="page-list" class="page active">
    <div class="section-title">Все встречи</div>
    <div class="meetings-grid" id="meetings-grid"></div>
  </div>

  <div id="page-detail" class="page">
    <button class="back-btn" onclick="showList()">← Все встречи</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const DATA_URL = 'meetings/index.json';

async function loadMeetings() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('not found');
    return await r.json();
  } catch {
    return [];
  }
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderList(meetings) {
  const grid = document.getElementById('meetings-grid');
  document.getElementById('header-count').textContent = meetings.length + ' встреч';
  if (!meetings.length) {
    grid.innerHTML = '<div class="empty-state"><p>Встречи ещё не добавлены</p></div>';
    return;
  }
  const sorted = [...meetings].sort((a, b) => new Date(b.date) - new Date(a.date));
  grid.innerHTML = sorted.map(m => `
    <div class="meeting-card" onclick="showDetail('${m.file}')">
      <div class="card-date">${formatDate(m.date)}</div>
      <div class="card-title">${m.title}</div>
      <div class="card-summary">${m.summary_preview || ''}</div>
      <div class="card-badges">
        <span class="badge badge-tasks">${m.tasks_count} задач</span>
        <span class="badge badge-resolved">${m.resolved_count} решено</span>
        <span class="badge badge-open">${m.open_count} открытых</span>
      </div>
    </div>`).join('');
}

async function showDetail(file) {
  const r = await fetch('meetings/' + file + '?t=' + Date.now());
  const m = await r.json();
  const d = document.getElementById('detail-content');
  d.innerHTML = `
    <div class="detail-header">
      <div class="detail-date">${formatDate(m.date)}</div>
      <div class="detail-title">${m.title}</div>
      ${m.participants ? `<div class="detail-participants">Участники: ${m.participants}</div>` : ''}
    </div>
    <div class="summary-block">${m.analysis.summary}</div>
    <div class="section-block">
      <h3>Задачи <span class="count-badge">${m.analysis.tasks.length}</span></h3>
      ${m.analysis.tasks.length ? m.analysis.tasks.map(t => `
        <div class="task-item">
          <div class="task-check"></div>
          <div class="task-content">
            <div class="task-text">${t.text}</div>
            <div class="task-meta">
              ${t.owner ? `<span class="task-owner">&#128100; ${t.owner}</span>` : ''}
              ${t.deadline ? `<span class="task-deadline">&#128197; ${t.deadline}</span>` : ''}
              ${t.fathom_link ? `<a class="task-fathom" href="${t.fathom_link}" target="_blank">▶ смотреть фрагмент</a>` : ''}
            </div>
          </div>
        </div>`).join('') : '<div class="no-items">Задачи не выявлены</div>'}
    </div>
    <div class="section-block">
      <h3>Решённые вопросы <span class="count-badge">${m.analysis.resolved.length}</span></h3>
      ${m.analysis.resolved.length ? m.analysis.resolved.map(r => `
        <div class="list-item"><div class="dot-green"></div><span>${r}</span></div>`).join('') : '<div class="no-items">—</div>'}
    </div>
    <div class="section-block">
      <h3>Открытые вопросы <span class="count-badge">${m.analysis.open_questions.length}</span></h3>
      ${m.analysis.open_questions.length ? m.analysis.open_questions.map(q => `
        <div class="list-item"><div class="dot-blue"></div><span>${q}</span></div>`).join('') : '<div class="no-items">—</div>'}
    </div>`;
  document.getElementById('page-list').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
}

function showList() {
  document.getElementById('page-list').classList.add('active');
  document.getElementById('page-detail').classList.remove('active');
}

loadMeetings().then(renderList);
</script>
</body>
</html>
